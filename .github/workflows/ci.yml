name: CI/CD - DNS API

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*.*.*'

  pull_request:
    branches: [ "main" ]

env:
  IMAGE_NAME: dns-api-devops

jobs:
  ci-cd:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: CI checklist
        run: |
          echo "CI checklist:"
          echo "- Checkout repository"
          echo "- Setup Python"
          echo "- Install dependencies"
          echo "- Run unit tests"
          echo "- Build Docker image"
          echo "- Push Docker image"
          echo "- Create Sentry release"
          echo "- Deploy to Render using Docker image version"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: PYTHONPATH=. pytest

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Docker metadata
        if: github.event_name == 'push'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Build and push Docker image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Select image version for Render
        if: github.event_name == 'push'
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            IMAGE_TAG="${GITHUB_REF_NAME#v}"
          else
            IMAGE_TAG="latest"
          fi

          IMAGE_URL="docker.io/${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}"

          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV
          echo "IMAGE_URL=${IMAGE_URL}" >> $GITHUB_ENV

          echo "Render will deploy image: ${IMAGE_URL}"

      - name: Create Sentry release
        if: github.event_name == 'push'
        uses: getsentry/action-release@v1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          environment: production
          version: ${{ github.ref_type == 'tag' && github.ref_name || github.sha }}
          set_commits: skip

      - name: Deploy to Render using Docker image version
        if: github.event_name == 'push'
        run: |
          ENCODED_IMAGE_URL=$(python3 -c "import os, urllib.parse; print(urllib.parse.quote(os.environ['IMAGE_URL'], safe=''))")
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}&imgURL=${ENCODED_IMAGE_URL}"
